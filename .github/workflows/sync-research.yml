name: Sync Research to Supabase

on:
  workflow_dispatch: # Allows manual triggering
  repository_dispatch:
    types: [sync-research] # Triggered when research repo pushes to main
  schedule:
    # Run daily at midnight UTC to check for updates (backup)
    - cron: '0 0 * * *'

jobs:
  sync-research:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Checkout research repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PAPERS_REPO }}
          token: ${{ secrets.PAPERS_TOKEN }}
          path: research-repo

      - name: Extract LaTeX Metadata
        run: |
          npm run extract-metadata research-repo || echo "Metadata extraction failed, continuing..."

      - name: Sync metadata and PDFs to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_RESEARCH_BUCKET: research
          SUPABASE_RESEARCH_STORAGE_PREFIX: ${{ secrets.SUPABASE_RESEARCH_STORAGE_PREFIX }}
          PAPERS_REPO: ${{ secrets.PAPERS_REPO }}
        run: |
          npm run sync-research -- --metadata-dir=content/research --pdf-dir=research-repo

      - name: Trigger Vercel deployment (optional)
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel --token $VERCEL_TOKEN --prod --yes || true

